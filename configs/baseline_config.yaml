# Baseline Pipeline Configuration

paths:
  input_dir: "input"
  spanish_dir: "input/Spanish"
  german_dir: "input/German"
  metadata_file: "input/Metdata_PCGITA.xlsx"
  features_dir: "features"
  outputs_dir: "outputs"
  metadata_out_dir: "metadata"
  figures_out_dir: "outputs/figures"
  tables_out_dir: "outputs/tables"
  reports_out_dir: "outputs/reports"

data:
  target_task: "readtext"
  target_sr: 16000

model:
  name: "facebook/wav2vec2-large-xlsr-53"
  type: "xlsr"
  target_layers: [0, 4, 8, 11]

evaluation:
  outer_folds: 10
  inner_folds: 9
  classifiers:
    - "linear_svm"
    - "logistic_regression"
  metrics:
    - "uar"
    - "accuracy"
    - "sensitivity"
    - "specificity"
    - "auc"

random_seed: 42
